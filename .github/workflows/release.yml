name: Release

on:
  pull_request:
    types:
      - closed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  packages: write
  pull-requests: read

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      startsWith(github.event.pull_request.head.ref, 'feature/')
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
      PR_BODY: ${{ github.event.pull_request.body }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_TITLE: ${{ github.event.pull_request.title }}

    steps:
      - name: Check out merge commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Fetch tags
        run: |
          set -euo pipefail
          git fetch --force --tags origin

      - name: Compute release version
        id: version
        run: |
          set -euo pipefail
          python3 scripts/release/compute_release.py

      - name: Stop when no release is required
        if: steps.version.outputs.release_required != 'true'
        run: |
          set -euo pipefail
          echo "No release is required for PR #${PR_NUMBER}."

      - name: Normalize image name
        if: steps.version.outputs.release_required == 'true'
        id: image
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY,,}"
          echo "name=ghcr.io/${repo}" >> "${GITHUB_OUTPUT}"

      - name: Create and push release tag
        if: steps.version.outputs.release_required == 'true' && steps.version.outputs.tag_exists != 'true'
        env:
          GIT_TAG: ${{ steps.version.outputs.git_tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${GIT_TAG}" "${MERGE_COMMIT_SHA}" -m "Release ${GIT_TAG}"
          git push origin "refs/tags/${GIT_TAG}"

      - name: Set up QEMU
        if: steps.version.outputs.release_required == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: steps.version.outputs.release_required == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: steps.version.outputs.release_required == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        if: steps.version.outputs.release_required == 'true'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ steps.version.outputs.docker_tag }}
            type=raw,value=${{ steps.version.outputs.git_tag }}
            type=raw,value=latest

      - name: Build and push multi-arch image
        if: steps.version.outputs.release_required == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          pull: true
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.docker_tag }}
            BUILD_COMMIT=${{ env.MERGE_COMMIT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Set up Helm
        if: steps.version.outputs.release_required == 'true'
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        if: steps.version.outputs.release_required == 'true'
        run: |
          set -euo pipefail
          helm lint deploy/chart \
            --set secrets.PMA_GATEWAY_MASTER_KEY_BASE64=lint-master-key \
            --set secrets.PMA_GATEWAY_INTERNAL_SHARED_SECRET=lint-internal-secret

      - name: Package Helm chart
        if: steps.version.outputs.release_required == 'true'
        run: |
          set -euo pipefail
          mkdir -p dist/charts

          helm package deploy/chart \
            --version "${{ steps.version.outputs.docker_tag }}" \
            --app-version "${{ steps.version.outputs.docker_tag }}" \
            --destination dist/charts

      - name: Log in to GHCR for Helm
        if: steps.version.outputs.release_required == 'true'
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io \
              --username "${{ github.actor }}" \
              --password-stdin

      - name: Push Helm chart to GHCR
        if: steps.version.outputs.release_required == 'true'
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"

          helm push \
            "dist/charts/pma-gateway-${{ steps.version.outputs.docker_tag }}.tgz" \
            "oci://ghcr.io/${owner}/charts"

      - name: Generate release notes
        if: steps.version.outputs.release_required == 'true'
        env:
          PREVIOUS_TAG: ${{ steps.version.outputs.previous_tag }}
        run: |
          set -euo pipefail
          python3 scripts/release/generate_release_notes.py \
            --repo "${GITHUB_REPOSITORY}" \
            --previous-tag "${PREVIOUS_TAG}" \
            --target "${MERGE_COMMIT_SHA}" \
            --output release-notes.md

      - name: Create or update GitHub Release
        if: steps.version.outputs.release_required == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.git_tag }}
          target_commitish: ${{ env.MERGE_COMMIT_SHA }}
          body_path: release-notes.md
          generate_release_notes: false
          files: |
            dist/charts/*.tgz
