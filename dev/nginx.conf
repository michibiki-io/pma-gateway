events {}

http {
  map $cookie_dev_as $dev_selector_cookie {
    default "alice";
    alice "alice";
    bob "bob";
  }

  map $arg_as $dev_selector_query {
    default "";
    alice "alice";
    bob "bob";
  }

  map $dev_selector_query $dev_selector {
    default $dev_selector_cookie;
    "" $dev_selector_cookie;
    alice "alice";
    bob "bob";
  }

  map $dev_selector $dev_user {
    default "alice@example.com";
    alice "alice@example.com";
    bob "bob@example.com";
  }

  map $dev_selector $dev_groups {
    default "db-users,db-admins";
    alice "db-users,db-admins";
    bob "db-users";
  }

  map $dev_selector_query $dev_selector_cookie_header {
    default "";
    alice "dev_as=alice; Path=/; HttpOnly; SameSite=Lax";
    bob "dev_as=bob; Path=/; HttpOnly; SameSite=Lax";
  }

  map $http_cookie $upstream_cookie {
    default $http_cookie;
    "~*^dev_as=[^;]*;?\s*(?<rest>.*)$" "$rest";
    "~*^(?<prefix>.*?);\s*dev_as=[^;]*;\s*(?<suffix>.*)$" "$prefix; $suffix";
    "~*^(?<prefix>.*?);\s*dev_as=[^;]*\s*$" "$prefix";
  }

  server {
    listen 8080;
    server_name _;

    location = / {
      if ($dev_selector_query != "") {
        add_header Set-Cookie $dev_selector_cookie_header always;
        return 302 /_gateway/?as=$dev_selector_query;
      }
      proxy_set_header Cookie $upstream_cookie;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Remote-User $dev_user;
      proxy_set_header Remote-Groups $dev_groups;
      proxy_pass http://pma-gateway:8080;
    }

    location = /pma/ {
      if ($dev_selector_query != "") {
        add_header Set-Cookie $dev_selector_cookie_header always;
        return 302 /pma/_gateway/?as=$dev_selector_query;
      }
      proxy_set_header Cookie $upstream_cookie;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Remote-User $dev_user;
      proxy_set_header Remote-Groups $dev_groups;
      proxy_pass http://pma-gateway:8080;
    }

    location / {
      add_header Set-Cookie $dev_selector_cookie_header always;
      proxy_set_header Cookie $upstream_cookie;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Remote-User $dev_user;
      proxy_set_header Remote-Groups $dev_groups;
      proxy_pass http://pma-gateway:8080;
    }
  }
}
