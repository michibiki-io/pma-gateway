events {}

http {
  map $arg_as $dev_user {
    default "alice@example.com";
    alice "alice@example.com";
    bob "bob@example.com";
  }

  map $arg_as $dev_groups {
    default "db-users,db-admins";
    alice "db-users,db-admins";
    bob "db-users";
  }

  server {
    listen 8080;
    server_name _;

    location / {
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Remote-User $dev_user;
      proxy_set_header Remote-Groups $dev_groups;
      proxy_pass http://pma-gateway:8080;
    }
  }
}
