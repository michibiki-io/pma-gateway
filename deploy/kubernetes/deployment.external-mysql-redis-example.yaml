apiVersion: apps/v1
kind: Deployment
metadata:
  name: pma-gateway
  namespace: pma-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: pma-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pma-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 33
        runAsGroup: 33
        fsGroup: 33
      containers:
        - name: pma-gateway
          image: ghcr.io/example/pma-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: pma-gateway-external-config
            - secretRef:
                name: pma-gateway-external-secret
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /dbadmin/healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /dbadmin/readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: tmp
          emptyDir: {}
