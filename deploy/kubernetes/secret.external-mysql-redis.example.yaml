apiVersion: v1
kind: Secret
metadata:
  name: pma-gateway-external-secret
  namespace: pma-gateway
type: Opaque
stringData:
  PMA_GATEWAY_MASTER_KEY_BASE64: REPLACE_WITH_BASE64_ENCODED_32_BYTE_KEY
  PMA_GATEWAY_INTERNAL_SHARED_SECRET: REPLACE_WITH_RANDOM_INTERNAL_SECRET
  PMA_GATEWAY_MYSQL_PASSWORD: REPLACE_WITH_MYSQL_PASSWORD
  PMA_GATEWAY_REDIS_PASSWORD: ""
  PMA_GATEWAY_BOOTSTRAP_CONFIG_JSON: |
    {
      "credentials": [],
      "mappings": []
    }
