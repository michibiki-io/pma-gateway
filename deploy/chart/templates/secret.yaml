{{- if not .Values.existingSecret }}
{{- $masterKey := trim (default "" .Values.secrets.PMA_GATEWAY_MASTER_KEY_BASE64) }}
{{- $internalSharedSecret := trim (default "" .Values.secrets.PMA_GATEWAY_INTERNAL_SHARED_SECRET) }}
{{- if not $masterKey }}
{{- fail "secrets.PMA_GATEWAY_MASTER_KEY_BASE64 is required unless existingSecret is set" }}
{{- end }}
{{- if not $internalSharedSecret }}
{{- fail "secrets.PMA_GATEWAY_INTERNAL_SHARED_SECRET is required unless existingSecret is set" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pma-gateway.secretName" . }}
  labels:
    {{- include "pma-gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.secrets }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
