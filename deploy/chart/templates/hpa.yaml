{{- if .Values.autoscaling.enabled }}
{{- $hasCpuMetric := not (empty .Values.autoscaling.targetCPUUtilizationPercentage) }}
{{- $hasMemoryMetric := not (empty .Values.autoscaling.targetMemoryUtilizationPercentage) }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "pma-gateway.fullname" . }}
  labels:
    {{- include "pma-gateway.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "pma-gateway.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  {{- if or $hasCpuMetric $hasMemoryMetric }}
  metrics:
    {{- if $hasCpuMetric }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if $hasMemoryMetric }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
  {{- end }}
{{- end }}
